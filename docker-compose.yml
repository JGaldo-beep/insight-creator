services:
  db:
    image: postgres:15
    container_name: insight_db
    environment:
      POSTGRES_USER: insight_user
      POSTGRES_PASSWORD: insight_pass
      POSTGRES_DB: insight_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insight_user -d insight_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: insight_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://insight_user:insight_pass@db:5432/insight_db
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src

volumes:
  postgres_data: